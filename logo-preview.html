<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TrendsOnFire – Logo</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 40px; }
    .section { margin-bottom: 50px; }
    .label { font-size: 13px; color: #999; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .box-light { background: #ffffff; padding: 40px 48px; border-radius: 12px; display: inline-block; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .box-dark  { background: #0f2340; padding: 40px 48px; border-radius: 12px; display: inline-block; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
    .row { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; }
  </style>
</head>
<body>

  <h2 style="color:#0f2340; margin-bottom:40px;">TrendsOnFire — Logo Versions</h2>

  <!-- HORIZONTAL LOGO - LIGHT -->
  <div class="section">
    <div class="label">Main Logo — Light Background</div>
    <div class="box-light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 76" width="330" height="76">
        <defs>
          <linearGradient id="fg1" x1="0.5" y1="1" x2="0.5" y2="0">
            <stop offset="0%" stop-color="#8b1a6a"/>
            <stop offset="100%" stop-color="#c97fb8"/>
          </linearGradient>
        </defs>
        <!-- Bars -->
        <rect x="4"  y="46" width="12" height="26" rx="2.5" fill="#0f2340" opacity="0.32"/>
        <rect x="20" y="32" width="12" height="40" rx="2.5" fill="#0f2340" opacity="0.6"/>
        <rect x="36" y="18" width="12" height="54" rx="2.5" fill="#0f2340"/>
        <!-- Triangle fire on tallest bar -->
        <polygon points="42,4 35,18 49,18" fill="url(#fg1)"/>
        <!-- Wordmark -->
        <text y="54" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-size="34" letter-spacing="-0.8">
          <tspan x="66" font-weight="800" fill="#0f2340">Trends</tspan><tspan font-weight="300" fill="#0f2340" letter-spacing="-0.5">On</tspan><tspan font-weight="800" fill="#8b1a6a">Fire</tspan>
        </text>
        <!-- Tagline -->
        <text x="66" y="69" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" fill="#0f2340" opacity="0.42" letter-spacing="2">PEOPLE · BUSINESS · TECHNOLOGY</text>
      </svg>
    </div>
  </div>

  <!-- HORIZONTAL LOGO - DARK -->
  <div class="section">
    <div class="label">Main Logo — Dark Background</div>
    <div class="box-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 330 76" width="330" height="76">
        <defs>
          <linearGradient id="fg2" x1="0.5" y1="1" x2="0.5" y2="0">
            <stop offset="0%" stop-color="#8b1a6a"/>
            <stop offset="100%" stop-color="#c97fb8"/>
          </linearGradient>
        </defs>
        <!-- Bars -->
        <rect x="4"  y="46" width="12" height="26" rx="2.5" fill="white" opacity="0.32"/>
        <rect x="20" y="32" width="12" height="40" rx="2.5" fill="white" opacity="0.62"/>
        <rect x="36" y="18" width="12" height="54" rx="2.5" fill="white"/>
        <!-- Triangle fire -->
        <polygon points="42,4 35,18 49,18" fill="url(#fg2)"/>
        <!-- Wordmark — Trends/On white, Fire fuchsia -->
        <text y="54" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-size="34" letter-spacing="-0.8">
          <tspan x="66" font-weight="800" fill="white">Trends</tspan><tspan font-weight="300" fill="white" letter-spacing="-0.5">On</tspan><tspan font-weight="800" fill="#8b1a6a">Fire</tspan>
        </text>
        <!-- Tagline -->
        <text x="66" y="69" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" fill="white" opacity="0.45" letter-spacing="2">PEOPLE · BUSINESS · TECHNOLOGY</text>
      </svg>
    </div>
  </div>

  <!-- ICON ONLY — with "fire" text -->
  <div class="section">
    <div class="label">Icon — for social media &amp; favicon</div>
    <div class="row">

      <!-- Light version -->
      <div class="box-light">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="96" height="132">
          <defs>
            <linearGradient id="fg3" x1="0.5" y1="1" x2="0.5" y2="0">
              <stop offset="0%" stop-color="#8b1a6a"/>
              <stop offset="100%" stop-color="#c97fb8"/>
            </linearGradient>
          </defs>
          <!-- Bars -->
          <rect x="2"  y="38" width="14" height="30" rx="3" fill="#0f2340" opacity="0.32"/>
          <rect x="20" y="22" width="14" height="46" rx="3" fill="#0f2340" opacity="0.6"/>
          <rect x="38" y="8"  width="14" height="60" rx="3" fill="#0f2340"/>
          <!-- Triangle fire -->
          <polygon points="45,0 36,12 54,12" fill="url(#fg3)"/>
          <!-- Full name below -->
          <text x="32" y="80" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-size="10" font-weight="800" fill="#0f2340" text-anchor="middle" letter-spacing="0.5">Trends<tspan fill="#8b1a6a">On</tspan><tspan fill="#8b1a6a" font-weight="800">Fire</tspan></text>
        </svg>
      </div>

      <!-- Dark version -->
      <div class="box-dark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="96" height="132">
          <defs>
            <linearGradient id="fg4" x1="0.5" y1="1" x2="0.5" y2="0">
              <stop offset="0%" stop-color="#8b1a6a"/>
              <stop offset="100%" stop-color="#c97fb8"/>
            </linearGradient>
          </defs>
          <!-- Bars -->
          <rect x="2"  y="38" width="14" height="30" rx="3" fill="white" opacity="0.32"/>
          <rect x="20" y="22" width="14" height="46" rx="3" fill="white" opacity="0.62"/>
          <rect x="38" y="8"  width="14" height="60" rx="3" fill="white"/>
          <!-- Triangle fire -->
          <polygon points="45,0 36,12 54,12" fill="url(#fg4)"/>
          <!-- Full name below -->
          <text x="32" y="80" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-size="10" font-weight="800" fill="white" text-anchor="middle" letter-spacing="0.5">Trends<tspan fill="#c97fb8">On</tspan><tspan fill="#c97fb8" font-weight="800">Fire</tspan></text>
        </svg>
      </div>

    </div>
  </div>

  <p style="color:#aaa; font-size:12px; margin-top:40px;">To save as image: right-click on any logo → Save image as. Or take a screenshot.</p>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <title>TrendsOnFire – Logo (Luxury)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #faf9f7; padding: 48px; color: #1f1f1f; }
    h2 { font-family: 'Cormorant Garamond', Georgia, serif; font-weight: 500; color: #0a0f1a; margin-bottom: 8px; letter-spacing: -0.3px; }
    .subtitle { font-size: 13px; color: #8b6a2f; letter-spacing: 3px; text-transform: uppercase; font-weight: 700; margin-bottom: 40px; }
    .section { margin-bottom: 48px; }
    .label { font-size: 11px; color: #8b6a2f; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; }
    .box-light { background: #ffffff; padding: 40px 48px; border-radius: 0; display: inline-block; border: 1px solid #e2dfd9; }
    .box-dark  { background: #0a0f1a; padding: 40px 48px; border-radius: 0; display: inline-block; box-shadow: 0 2px 12px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
    .box-dark::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 30% 50%, rgba(184,151,106,.07) 0%, transparent 60%); pointer-events:none; }
    .box-dark > * { position: relative; z-index: 1; }
    .row { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; }
  </style>
</head>
<body>

  <h2>TrendsOnFire — Logo Versions</h2>
  <div class="subtitle">Luxury Palette · Champagne Gold + Dark Ink</div>

  <!-- LIGHT LOGO -->
  <div class="section">
    <div class="label">Main Logo — Light Background</div>
    <div class="box-light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 305 76" width="305" height="76">
        <defs>
          <linearGradient id="tg1" x1="0.5" y1="1" x2="0.5" y2="0">
            <stop offset="0%" stop-color="#8b6a2f"/>
            <stop offset="100%" stop-color="#d4c4a8"/>
          </linearGradient>
        </defs>
        <!-- Bars -->
        <rect x="4"  y="46" width="12" height="26" rx="2.5" fill="#0a0f1a" opacity="0.32"/>
        <rect x="20" y="32" width="12" height="40" rx="2.5" fill="#0a0f1a" opacity="0.6"/>
        <rect x="36" y="18" width="12" height="54" rx="2.5" fill="#0a0f1a"/>
        <!-- Triangle -->
        <polygon points="42,3 35,15 49,15" fill="url(#tg1)"/>
        <!-- Wordmark -->
        <text y="54" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-size="34" letter-spacing="-0.8">
          <tspan x="60" font-weight="800" fill="#0a0f1a">Trends</tspan><tspan font-weight="300" fill="#0a0f1a" letter-spacing="-0.5">On</tspan><tspan font-weight="800" fill="#8b6a2f">Fire</tspan>
        </text>
        <!-- Tagline -->
        <text x="67" y="69" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" fill="#4e4e4e" letter-spacing="2.2" font-weight="600">SEE WHAT OTHERS MISS</text>
      </svg>
    </div>
  </div>

  <!-- DARK LOGO -->
  <div class="section">
    <div class="label">Main Logo — Dark Background</div>
    <div class="box-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 305 76" width="305" height="76">
        <defs>
          <linearGradient id="tg2" x1="0.5" y1="1" x2="0.5" y2="0">
            <stop offset="0%" stop-color="#8b6a2f"/>
            <stop offset="100%" stop-color="#d4c4a8"/>
          </linearGradient>
        </defs>
        <!-- Bars -->
        <rect x="4"  y="46" width="12" height="26" rx="2.5" fill="white" opacity="0.32"/>
        <rect x="20" y="32" width="12" height="40" rx="2.5" fill="white" opacity="0.62"/>
        <rect x="36" y="18" width="12" height="54" rx="2.5" fill="white"/>
        <!-- Triangle -->
        <polygon points="42,3 35,15 49,15" fill="url(#tg2)"/>
        <!-- Wordmark -->
        <text y="54" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-size="34" letter-spacing="-0.8">
          <tspan x="60" font-weight="800" fill="white">Trends</tspan><tspan font-weight="300" fill="white" letter-spacing="-0.5">On</tspan><tspan font-weight="800" fill="#b8976a">Fire</tspan>
        </text>
        <!-- Tagline -->
        <text x="67" y="69" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" fill="rgba(255,255,255,.62)" letter-spacing="2.2" font-weight="600">SEE WHAT OTHERS MISS</text>
      </svg>
    </div>
  </div>

  <!-- SOCIAL MEDIA ICONS -->
  <div class="section">
    <div class="label">Social Media Icon</div>
    <div class="row">

      <!-- Light -->
      <div class="box-light">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 96" width="108" height="144">
          <defs>
            <linearGradient id="tg3" x1="0.5" y1="1" x2="0.5" y2="0">
              <stop offset="0%" stop-color="#8b6a2f"/>
              <stop offset="100%" stop-color="#d4c4a8"/>
            </linearGradient>
          </defs>
          <!-- Triangle -->
          <polygon points="53,3 46,16 60,16" fill="url(#tg3)"/>
          <!-- Right bar (tallest) -->
          <rect x="46" y="19" width="14" height="55" rx="2.5" fill="#0a0f1a"/>
          <!-- "Trends" -->
          <text x="2" y="29" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
                font-size="10" font-weight="800" fill="#0a0f1a" letter-spacing="0.2">Trends</text>
          <!-- Middle bar -->
          <rect x="25" y="38" width="14" height="36" rx="2.5" fill="#0a0f1a" opacity="0.6"/>
          <!-- Left bar -->
          <rect x="4"  y="56" width="14" height="18" rx="2.5" fill="#0a0f1a" opacity="0.32"/>
          <!-- "OnFire" at bottom -->
          <text x="36" y="90" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
                font-size="13" text-anchor="middle" letter-spacing="-0.3">
            <tspan font-weight="300" fill="#0a0f1a">On</tspan><tspan font-weight="800" fill="#8b6a2f">Fire</tspan>
          </text>
        </svg>
      </div>

      <!-- Dark -->
      <div class="box-dark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 96" width="108" height="144">
          <defs>
            <linearGradient id="tg4" x1="0.5" y1="1" x2="0.5" y2="0">
              <stop offset="0%" stop-color="#8b6a2f"/>
              <stop offset="100%" stop-color="#d4c4a8"/>
            </linearGradient>
          </defs>
          <!-- Triangle -->
          <polygon points="53,3 46,16 60,16" fill="url(#tg4)"/>
          <!-- Right bar -->
          <rect x="46" y="19" width="14" height="55" rx="2.5" fill="white"/>
          <!-- "Trends" -->
          <text x="2" y="29" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
                font-size="10" font-weight="800" fill="white" letter-spacing="0.2">Trends</text>
          <!-- Middle bar -->
          <rect x="25" y="38" width="14" height="36" rx="2.5" fill="white" opacity="0.62"/>
          <!-- Left bar -->
          <rect x="4"  y="56" width="14" height="18" rx="2.5" fill="white" opacity="0.32"/>
          <!-- "OnFire" at bottom -->
          <text x="36" y="90" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
                font-size="13" text-anchor="middle" letter-spacing="-0.3">
            <tspan font-weight="300" fill="white">On</tspan><tspan font-weight="800" fill="#b8976a">Fire</tspan>
          </text>
        </svg>
      </div>

    </div>
  </div>

  <p style="color:#8b6a2f; font-size:12px; margin-top:48px; letter-spacing:1.5px; text-transform:uppercase; font-weight:600;">To save as image: right-click on any logo → Save image as. Or take a screenshot.</p>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <title>TrendsOnFire – Logo (Cartier Red)</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 40px; }
    .section { margin-bottom: 50px; }
    .label { font-size: 13px; color: #999; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 1px; }
    .box-light { background: #ffffff; padding: 40px 48px; border-radius: 12px; display: inline-block; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .box-dark  { background: #0f2340; padding: 40px 48px; border-radius: 12px; display: inline-block; box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
    .row { display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap; }
  </style>
</head>
<body>

  <h2 style="color:#0f2340; margin-bottom:8px;">TrendsOnFire — Logo Versions</h2>
  <p style="color:#999; font-size:13px; margin-bottom:40px;">Colour variant: Cartier Red &nbsp;·&nbsp; <a href="logo-preview.html" style="color:#8b1a6a;">← Back to Fuchsia version</a></p>

  <!-- LIGHT LOGO -->
  <div class="section">
    <div class="label">Main Logo — Light Background</div>
    <div class="box-light">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 305 76" width="305" height="76">
        <defs>
          <linearGradient id="tg1" x1="0.5" y1="1" x2="0.5" y2="0">
            <stop offset="0%" stop-color="#8B1A1A"/>
            <stop offset="100%" stop-color="#C47070"/>
          </linearGradient>
        </defs>
        <rect x="4"  y="46" width="12" height="26" rx="2.5" fill="#0f2340" opacity="0.32"/>
        <rect x="20" y="32" width="12" height="40" rx="2.5" fill="#0f2340" opacity="0.6"/>
        <rect x="36" y="18" width="12" height="54" rx="2.5" fill="#0f2340"/>
        <polygon points="42,3 35,15 49,15" fill="url(#tg1)"/>
        <text y="54" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-size="34" letter-spacing="-0.8">
          <tspan x="60" font-weight="800" fill="#0f2340">Trends</tspan><tspan font-weight="300" fill="#0f2340" letter-spacing="-0.5">On</tspan><tspan font-weight="800" fill="#8B1A1A">Fire</tspan>
        </text>
        <text x="67" y="69" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" fill="#6f7b8c" letter-spacing="2.2" font-weight="600">SEE WHAT OTHERS MISS</text>
      </svg>
    </div>
  </div>

  <!-- DARK LOGO -->
  <div class="section">
    <div class="label">Main Logo — Dark Background</div>
    <div class="box-dark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 305 76" width="305" height="76">
        <defs>
          <linearGradient id="tg2" x1="0.5" y1="1" x2="0.5" y2="0">
            <stop offset="0%" stop-color="#8B1A1A"/>
            <stop offset="100%" stop-color="#C47070"/>
          </linearGradient>
        </defs>
        <rect x="4"  y="46" width="12" height="26" rx="2.5" fill="white" opacity="0.32"/>
        <rect x="20" y="32" width="12" height="40" rx="2.5" fill="white" opacity="0.62"/>
        <rect x="36" y="18" width="12" height="54" rx="2.5" fill="white"/>
        <polygon points="42,3 35,15 49,15" fill="url(#tg2)"/>
        <text y="54" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-size="34" letter-spacing="-0.8">
          <tspan x="60" font-weight="800" fill="white">Trends</tspan><tspan font-weight="300" fill="white" letter-spacing="-0.5">On</tspan><tspan font-weight="800" fill="#8B1A1A">Fire</tspan>
        </text>
        <text x="67" y="69" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" fill="white" letter-spacing="2.2" font-weight="600">SEE WHAT OTHERS MISS</text>
      </svg>
    </div>
  </div>

  <!-- SOCIAL MEDIA ICONS -->
  <div class="section">
    <div class="label">Social Media Icon</div>
    <div class="row">

      <!-- Light -->
      <div class="box-light">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 96" width="108" height="144">
          <defs>
            <linearGradient id="tg3" x1="0.5" y1="1" x2="0.5" y2="0">
              <stop offset="0%" stop-color="#8B1A1A"/>
              <stop offset="100%" stop-color="#C47070"/>
            </linearGradient>
          </defs>
          <polygon points="53,3 46,16 60,16" fill="url(#tg3)"/>
          <rect x="46" y="19" width="14" height="55" rx="2.5" fill="#0f2340"/>
          <text x="2" y="29" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
                font-size="10" font-weight="800" fill="#0f2340" letter-spacing="0.2">Trends</text>
          <rect x="25" y="38" width="14" height="36" rx="2.5" fill="#0f2340" opacity="0.6"/>
          <rect x="4"  y="56" width="14" height="18" rx="2.5" fill="#0f2340" opacity="0.32"/>
          <text x="36" y="90" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
                font-size="13" text-anchor="middle" letter-spacing="-0.3">
            <tspan font-weight="300" fill="#0f2340">On</tspan><tspan font-weight="800" fill="#8B1A1A">Fire</tspan>
          </text>
        </svg>
      </div>

      <!-- Dark -->
      <div class="box-dark">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 96" width="108" height="144">
          <defs>
            <linearGradient id="tg4" x1="0.5" y1="1" x2="0.5" y2="0">
              <stop offset="0%" stop-color="#8B1A1A"/>
              <stop offset="100%" stop-color="#C47070"/>
            </linearGradient>
          </defs>
          <polygon points="53,3 46,16 60,16" fill="url(#tg4)"/>
          <rect x="46" y="19" width="14" height="55" rx="2.5" fill="white"/>
          <text x="2" y="29" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
                font-size="10" font-weight="800" fill="white" letter-spacing="0.2">Trends</text>
          <rect x="25" y="38" width="14" height="36" rx="2.5" fill="white" opacity="0.62"/>
          <rect x="4"  y="56" width="14" height="18" rx="2.5" fill="white" opacity="0.32"/>
          <text x="36" y="90" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
                font-size="13" text-anchor="middle" letter-spacing="-0.3">
            <tspan font-weight="300" fill="white">On</tspan><tspan font-weight="800" fill="#8B1A1A">Fire</tspan>
          </text>
        </svg>
      </div>

    </div>
  </div>

  <p style="color:#aaa; font-size:12px; margin-top:40px;">To save as image: right-click on any logo → Save image as. Or take a screenshot.</p>

</body>
</html>

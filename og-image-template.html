<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <title>OG Image Template</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 1200px; height: 630px; overflow: hidden; background: #ffffff; display: flex; align-items: center; justify-content: center; flex-direction: column; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .logo-wrap { margin-bottom: 32px; }
    .tagline { font-size: 22px; color: #6f7b8c; letter-spacing: 4px; font-weight: 600; text-transform: uppercase; }
    .domain { font-size: 18px; color: #0f2340; margin-top: 20px; opacity: 0.5; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="logo-wrap">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 305 76" width="488" height="122">
      <defs>
        <linearGradient id="tg1" x1="0.5" y1="1" x2="0.5" y2="0">
          <stop offset="0%" stop-color="#8b1a6a"/>
          <stop offset="100%" stop-color="#c97fb8"/>
        </linearGradient>
      </defs>
      <rect x="4"  y="46" width="12" height="26" rx="2.5" fill="#0f2340" opacity="0.32"/>
      <rect x="20" y="32" width="12" height="40" rx="2.5" fill="#0f2340" opacity="0.6"/>
      <rect x="36" y="18" width="12" height="54" rx="2.5" fill="#0f2340"/>
      <polygon points="42,3 35,15 49,15" fill="url(#tg1)"/>
      <text y="54" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-size="34" letter-spacing="-0.8">
        <tspan x="60" font-weight="800" fill="#0f2340">Trends</tspan><tspan font-weight="300" fill="#0f2340" letter-spacing="-0.5">On</tspan><tspan font-weight="800" fill="#8b1a6a">Fire</tspan>
      </text>
      <text x="67" y="69" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9.5" fill="#6f7b8c" letter-spacing="2.2" font-weight="600">SEE WHAT OTHERS MISS</text>
    </svg>
  </div>
  <div class="tagline">Strategic Market Intelligence · Retail · People · Technology</div>
  <div class="domain">trendsonfire.com</div>
</body>
</html>

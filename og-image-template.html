<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <title>OG Image — TrendsOnFire (Luxury)</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: #0a0f1a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 45%, rgba(184,151,106,.14) 0%, transparent 55%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 90%, rgba(184,151,106,.06) 0%, transparent 50%);
      pointer-events: none;
    }
    .frame {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 80px;
    }
    .logo-wrap { margin-bottom: 28px; }
    .eyebrow {
      font-size: 14px;
      color: #b8976a;
      letter-spacing: 5px;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .headline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 36px;
      font-weight: 400;
      color: rgba(255,255,255,.92);
      line-height: 1.3;
      letter-spacing: 0.5px;
      max-width: 960px;
      margin: 0 auto;
    }
    .rule {
      width: 72px;
      height: 1px;
      background: #b8976a;
      margin: 26px auto 20px;
      opacity: 0.8;
    }
    .footer-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }
    .domain {
      font-size: 13px;
      color: #b8976a;
      letter-spacing: 3px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(184,151,106,.5);
    }
    .byline {
      font-size: 13px;
      color: rgba(255,255,255,.55);
      letter-spacing: 2px;
      font-weight: 500;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="logo-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 305 76" width="560" height="140">
        <rect x="4"  y="46" width="12" height="26" rx="2.5" fill="white" opacity="0.28"/>
        <rect x="20" y="32" width="12" height="40" rx="2.5" fill="white" opacity="0.55"/>
        <rect x="36" y="18" width="12" height="54" rx="2.5" fill="white" opacity="0.9"/>
        <polygon points="42,3 35,15 49,15" fill="#b8976a"/>
        <text y="54" font-family="'Helvetica Neue','Arial Black',Arial,sans-serif" font-size="34" letter-spacing="-0.8">
          <tspan x="60" font-weight="800" fill="white">Trends</tspan><tspan font-weight="300" fill="white" letter-spacing="-0.5">On</tspan><tspan font-weight="800" fill="#b8976a">Fire</tspan>
        </text>
      </svg>
    </div>

    <div class="eyebrow">See What Others Miss</div>

    <div class="headline">
      Strategic Market Intelligence &middot; Retail &middot; People &middot; Technology
    </div>

    <div class="rule"></div>

    <div class="footer-bar">
      <span class="domain">trendsonfire.com</span>
      <span class="dot"></span>
      <span class="byline">By Olga Bressers</span>
    </div>
  </div>
</body>
</html>
